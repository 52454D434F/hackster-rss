name: Scrape RSS Feeds

on:
  schedule:
    # Every 2 hours between 8:00 and 22:00 UTC
    - cron: "0 8-22/2 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedgen

      - name: Run Hackster.io scraper
        run: python scrape.py

      - name: Run 1440 Science & Technology scraper
        run: python scrape_1440.py

      - name: Commit and push feed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml docs/1440-science-technology.xml
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
